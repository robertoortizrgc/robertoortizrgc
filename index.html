<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RGC Optimizado</title>
    
    <!-- 1. Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel (Traduce el código JSX para que el navegador lo entienda) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 4. Iconos Lucide y Librerías de PDF Nativas (jsPDF + autoTable) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    
    <!-- Aquí es donde React va a "inyectar" toda la aplicación -->
    <div id="root"></div>

    <!-- Script principal de la aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SOLUCIÓN ERROR REMOVECHILD: MAPEO SEGURO DE ICONOS ---
        const Icon = ({ name, className }) => {
            const svgString = React.useMemo(() => {
                if (!window.lucide) return '';
                // Renderizamos el icono en un div temporal desconectado para que 
                // Lucide no destruya los nodos del DOM que React controla.
                const div = document.createElement('div');
                div.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                window.lucide.createIcons({ root: div });
                return div.innerHTML;
            }, [name, className]);

            return <span className="contents" dangerouslySetInnerHTML={{ __html: svgString }} />;
        };

        const Users = (p) => <Icon name="users" {...p} />;
        const Search = (p) => <Icon name="search" {...p} />;
        const ShieldCheck = (p) => <Icon name="shield-check" {...p} />;
        const Briefcase = (p) => <Icon name="briefcase" {...p} />;
        const AlertCircle = (p) => <Icon name="alert-circle" {...p} />;
        const LayoutGrid = (p) => <Icon name="layout-grid" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const ArrowRight = (p) => <Icon name="arrow-right" {...p} />;
        const AlertTriangle = (p) => <Icon name="alert-triangle" {...p} />;
        const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p} />;
        const Ban = (p) => <Icon name="ban" {...p} />;
        const Siren = (p) => <Icon name="siren" {...p} />;
        const XCircle = (p) => <Icon name="x-circle" {...p} />;
        const CalendarX = (p) => <Icon name="calendar-x" {...p} />;
        const FileWarning = (p) => <Icon name="file-warning" {...p} />;
        const Building2 = (p) => <Icon name="building-2" {...p} />;
        const Thermometer = (p) => <Icon name="thermometer" {...p} />;
        const Printer = (p) => <Icon name="printer" {...p} />;
        const GitMerge = (p) => <Icon name="git-merge" {...p} />;
        const BookOpen = (p) => <Icon name="book-open" {...p} />;
        const Calculator = (p) => <Icon name="calculator" {...p} />;
        const ChevronLeft = (p) => <Icon name="chevron-left" {...p} />;
        const Download = (p) => <Icon name="download" {...p} />;
        const FileSpreadsheet = (p) => <Icon name="file-spreadsheet" {...p} />;
        const Eye = (p) => <Icon name="eye" {...p} />;
        const History = (p) => <Icon name="history" {...p} />;

        // --- ESTILOS GLOBALES DE IMPRESIÓN Y GENERADOR PDF ---
        const printStyles = `
        @media print {
            @page { size: A4 portrait; margin: 1.5cm; }
            body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                background-color: white !important; 
                font-family: 'Inter', system-ui, sans-serif !important;
                color: #1e293b !important;
            }
            .print-hidden { display: none !important; }
            .print-block { display: block !important; }
            .print-flex { display: flex !important; }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; break-inside: avoid; }
            * { box-shadow: none !important; }
            .print-border { border: 1px solid #cbd5e1 !important; }
            .print-bg-blue { background-color: #003366 !important; color: white !important; }
            .print-bg-gold { background-color: #D4AF37 !important; color: #003366 !important; }
            .print-text-blue { color: #003366 !important; }
            .print-text-gold { color: #D4AF37 !important; }
            .tab-content { display: block !important; }
        }

        .pdf-mode {
            background-color: white !important;
            padding: 20px !important;
            color: #1e293b !important;
        }
        .pdf-mode .print\\:hidden { display: none !important; }
        .pdf-mode .print\\:block { display: block !important; }
        .pdf-mode .print\\:flex { display: flex !important; }
        .pdf-mode .print\\:shadow-none { box-shadow: none !important; }
        .pdf-mode .print\\:bg-white { background-color: white !important; }
        .pdf-mode .print\\:border { border: 1px solid #cbd5e1 !important; }
        .pdf-mode .tab-content { display: block !important; }
        .pdf-mode .page-break { page-break-before: always; }
        .pdf-mode .avoid-break { page-break-inside: avoid; break-inside: avoid; }
        `;

        // --- DEFINICIONES Y MAPEOS ---
        const ORIGEN_MAP = {
        '0': 'Ventanilla', '1': 'Ajuste automático', '2': 'Dispositivo magnético',
        '3': 'Auditoría (Autocorrección)', '4': 'IDSE (Internet)', '5': 'Auditoría IMSS (SIREM)',
        '6': 'Auditoría IMSS (Auto)', '7': 'Auditoría SIVEPA (Multa)', '8': 'Capturado Manualmente',
        '9': 'Baja Extemporánea Empresarial'
        };

        const TIPO_MAP = {
        '8': 'Reingreso', '7': 'Modif. Salarial', '1': 'Alta', '2': 'Baja'
        };

        // --- UTILIDADES ---
        const parseDateStr = (str) => {
        if (!str) return null;
        const match = str.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
        if (!match) return null;
        const [_, day, month, year] = match.map(Number);
        if (!day || !month || !year) return null; 
        return new Date(year, month - 1, day);
        };

        const formatDate = (date) => {
        if (!date) return '';
        return date.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
        };

        const isRiskOrigin = (code) => {
        const num = parseInt(code, 10);
        return num >= 5 && num <= 9;
        };

        const isInternalAdjustment = (regPatronal) => {
        if (!regPatronal) return false;
        return /9{4,}00$/.test(regPatronal);
        };

        // --- TERMÓMETRO DE EXTEMPORANEIDAD ---
        const getLateSubmissionInfo = (fRecep, fMov) => {
        if (!fRecep || fRecep === '00/00/0000') return { isLate: false }; 
        const dRecep = parseDateStr(fRecep);
        const dMov = parseDateStr(fMov);
        if (!dRecep || !dMov) return { isLate: false };

        const diffTime = dRecep.getTime() - dMov.getTime();
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

        if (diffDays <= 5) return { isLate: false };

        let weekendDays = 0;
        let curDate = new Date(dMov.getTime());
        curDate.setDate(curDate.getDate() + 1); 
        while (curDate <= dRecep) {
            const dayOfWeek = curDate.getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) weekendDays++;
            curDate.setDate(curDate.getDate() + 1);
        }

        const businessDays = diffDays - weekendDays;
        let level = 0, colorClass = '', label = '', badgeClass = '', obs = '';

        if (businessDays <= 5) {
            return {
                isLate: true,
                isJustified: true,
                diffDays,
                businessDays,
                level: 0,
                label: 'En Tiempo (Hábiles)',
                colorClass: 'text-emerald-600',
                badgeClass: 'bg-emerald-50 border-emerald-200 text-emerald-700',
                obs: `Se cruzaron ${weekendDays} días inhábiles (sábado/domingo).`
            };
        }

        if (diffDays >= 6 && diffDays <= 14) {
            level = 1; label = '5 a 14 días'; colorClass = 'text-yellow-600'; badgeClass = 'bg-yellow-50 border-yellow-200 text-yellow-700';
        } else if (diffDays >= 15 && diffDays <= 30) {
            level = 2; label = '15 a 30 días'; colorClass = 'text-orange-500'; badgeClass = 'bg-orange-50 border-orange-200 text-orange-700 font-semibold';
        } else if (diffDays > 30 && diffDays <= 365) {
            level = 3; label = '1 a 12 meses'; colorClass = 'text-red-500'; badgeClass = 'bg-red-50 border-red-300 text-red-700 font-bold';
        } else if (diffDays > 365) {
            level = 4; label = '+ de 1 año'; colorClass = 'text-rose-600'; badgeClass = 'bg-rose-600 border-rose-700 text-white font-black shadow-md';
        }

        if (weekendDays > 0) {
            obs = `Excedido. Incluye ${weekendDays} días inhábiles de fin de semana.`;
        }

        return { isLate: true, isJustified: false, diffDays, businessDays, level, label, colorClass, badgeClass, obs };
        };

        // --- COMPONENTES VISUALES ---
        const StatusBadge = ({ code, map, type, isRisk, colorOverride }) => {
        const label = map[code] || `Código ${code}`;
        let styles = type === 'O' 
            ? 'bg-[#003366]/10 text-[#003366] border-[#003366]/20 print-border' 
            : 'bg-slate-50 text-slate-700 border-slate-200 print-border';

        if (colorOverride) styles = colorOverride;
        if (isRisk) styles = 'bg-rose-100 text-rose-800 border-rose-200 font-bold print-border print-text-rose-600';

        return (
            <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded border text-[10px] uppercase tracking-tight w-fit ${styles}`}>
            <span className="opacity-60 font-semibold">{type}:</span>
            <span className="font-semibold">{label}</span>
            {isRisk && <AlertCircle className="w-3 h-3 text-rose-600" />}
            </div>
        );
        };

        const StatusBadgeCruce = ({ status }) => {
        let styles = "";
        if(status === 'CRITICO') styles = "bg-rose-600 text-white border-rose-700 print-bg-rose-600";
        if(status === 'ALERTA') styles = "bg-orange-500 text-white border-orange-600";
        if(status === 'INFO') styles = "bg-[#003366] text-white border-[#002244] print-bg-blue";
        if(status === 'OK') styles = "bg-emerald-50 text-emerald-700 border-emerald-200";
        
        return (
            <span className={`text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-md border shadow-sm ${styles}`}>
                {status}
            </span>
        )
        };

        const ModuloPension = () => {
        return (
            <div className="w-full h-[85vh] min-h-[600px] rounded-2xl overflow-hidden bg-slate-50 border border-slate-200 flex items-center justify-center relative shadow-inner">
                <iframe 
                src="https://robertoiroc.github.io/COTIZADOR/" 
                title="Cálculo de Pensión RGC" 
                className="w-full h-full border-0 bg-white"
                allow="clipboard-write; clipboard-read"
                />
            </div>
        );
        };

        const App = () => {
        const [rawData, setRawData] = useState('');
        const [rawSisec, setRawSisec] = useState('');
        
        const [parsedData, setParsedData] = useState(null);
        const [sisecData, setSisecData] = useState(null);
        const [cruceData, setCruceData] = useState(null);
        
        const [activeTab, setActiveTab] = useState('sindo'); 
        const [isSisecEnabled, setIsSisecEnabled] = useState(false); 
        const [currentModule, setCurrentModule] = useState('menu'); 
        const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
        const [viewMode, setViewMode] = useState('auditor');
        
        // --- ESTADOS DE SEGURIDAD PARA SINDO ---
        const [showSindoAuth, setShowSindoAuth] = useState(false);
        const [sindoPassword, setSindoPassword] = useState('');
        const [sindoAuthError, setSindoAuthError] = useState(false);

        useEffect(() => {
            const styleSheet = document.createElement("style");
            styleSheet.type = "text/css";
            styleSheet.innerText = printStyles;
            document.head.appendChild(styleSheet);
            return () => {
                if (document.head.contains(styleSheet)) {
                    document.head.removeChild(styleSheet);
                }
            };
        }, []);

        const triggerNativePrint = () => { window.print(); };

        const handleDownloadPDF = () => {
            if (!parsedData) return;
            setIsGeneratingPDF(true);
            
            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('p', 'pt', 'letter');
                    
                    const colorPrimary = [0, 51, 102]; // #003366
                    const colorGold = [212, 175, 55];  // #D4AF37
                    const colorRed = [220, 38, 38];
                    
                    let yPos = 40;
                    
                    // --- PORTADA / ENCABEZADO ---
                    doc.setFontSize(16);
                    doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                    doc.setFont("helvetica", "bold");
                    doc.text("DICTAMEN TÉCNICO DE AUDITORÍA SINDO", 40, yPos);
                    
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.setFont("helvetica", "normal");
                    const fechaEmision = new Date().toLocaleDateString('es-MX');
                    doc.text(`Fecha de Emisión: ${fechaEmision}`, 400, yPos);
                    
                    yPos += 20;
                    doc.setDrawColor(colorGold[0], colorGold[1], colorGold[2]);
                    doc.setLineWidth(2);
                    doc.line(40, yPos, 570, yPos);
                    yPos += 25;

                    // Datos del Asegurado
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont("helvetica", "bold");
                    doc.text("1. INFORMACIÓN DEL ASEGURADO", 40, yPos);
                    yPos += 15;
                    
                    doc.setFontSize(10);
                    doc.setFont("helvetica", "normal");
                    doc.text(`Nombre Completo: ${parsedData?.personal?.nombre || 'N/A'}`, 40, yPos);
                    yPos += 15;
                    doc.text(`NSS: ${parsedData?.personal?.nss || 'N/A'}`, 40, yPos);
                    doc.text(`CURP: ${parsedData?.personal?.curp || 'N/A'}`, 250, yPos);
                    if (sisecData?.totalSemanas) {
                         doc.text(`Semanas SISEC: ${sisecData.totalSemanas}`, 400, yPos);
                    }
                    yPos += 30;

                    // --- DIAGNÓSTICO DE RIESGOS ---
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                    doc.text("2. RESUMEN DE RIESGOS DETECTADOS", 40, yPos);
                    yPos += 15;

                    doc.setFontSize(10);
                    doc.setTextColor(0, 0, 0);
                    doc.setFont("helvetica", "normal");
                    
                    const risksText = [
                        `• Movimientos de Alto Riesgo (Origen 5-9): ${parsedData.stats.totalRisks}`,
                        `• Tramites Extemporáneos Detectados: ${parsedData.stats.lateEvents.filter(e => !e.isJustified && !e.isMod40Retro).length}`,
                        `• Empresas Canceladas (Art. 251 / Baja IMSS): ${parsedData.stats.bajaCompanies.length}`
                    ];
                    
                    risksText.forEach(t => {
                        doc.text(t, 50, yPos);
                        yPos += 15;
                    });
                    
                    yPos += 15;

                    // --- TABLAS POR EMPRESA ---
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                    doc.text("3. DETALLE DE MOVIMIENTOS POR EMPRESA (HISTORIAL SINDO)", 40, yPos);
                    yPos += 20;

                    parsedData.grouped.forEach((group, idx) => {
                        // Salto de página preventivo
                        if (yPos > 650) { 
                            doc.addPage(); 
                            yPos = 40; 
                        }

                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                        doc.text(`${idx + 1}. ${group.info.nombre}`, 40, yPos);
                        yPos += 14;
                        
                        doc.setFontSize(9);
                        doc.setFont("helvetica", "normal");
                        doc.setTextColor(100, 100, 100);
                        let subHeader = `Reg. Patronal: ${group.info.registroDisplay} | Periodo: ${group.info.periodIndex} de ${group.info.totalPeriods}`;
                        if (group.info.isBaja) subHeader += ` | ESTATUS: BAJA POR IMSS (${group.info.bajaReason})`;
                        if (group.info.isInternalAdjustment) subHeader += ` | ESTATUS: AJUSTE INTERNO IMSS`;
                        doc.text(subHeader, 40, yPos);
                        yPos += 10;

                        // Preparar datos de la tabla
                        const tableBody = group.movements.map(mov => {
                            const tipoIni = TIPO_MAP[mov.tipoIni] || mov.tipoIni;
                            const origenIni = ORIGEN_MAP[mov.origenIni] || mov.origenIni;
                            const isRiskIni = isRiskOrigin(mov.origenIni);
                            
                            const tipoFin = TIPO_MAP[mov.tipoFin] || mov.tipoFin;
                            const isBaja = mov.tipoFin === '2';
                            const origenFin = ORIGEN_MAP[mov.origenFin] || mov.origenFin;
                            const isRiskFin = isRiskOrigin(mov.origenFin);

                            let obs = [];
                            if (mov.lateInfo?.isLate) {
                                if (mov.lateInfo.isMod40Retro) obs.push('M40 Retroactiva');
                                else if (!mov.lateInfo.isJustified) obs.push(`Extemp: ${mov.lateInfo.label}`);
                            }
                            if (isRiskIni) obs.push(`Riesgo (Inicio): Origen ${mov.origenIni}`);
                            if (isRiskFin && mov.fBaja) obs.push(`Riesgo (Cierre): Origen ${mov.origenFin}`);
                            if (mov.fRecep === '00/00/0000') obs.push('Fecha Recepción: 00/00/0000');
                            if (mov.isPostBaja) obs.push('MOVIMIENTO POST-CLAUSURA');

                            return [
                                mov.fMov,
                                `${tipoIni}\nOrigen: ${origenIni}`,
                                `$${mov.salario}`,
                                mov.fBaja ? `${mov.fBaja}\n(${isBaja ? 'Baja' : 'Cierre'})` : 'Vigente',
                                obs.length > 0 ? obs.join('\n') : 'Trámite Regular'
                            ];
                        });

                        doc.autoTable({
                            startY: yPos,
                            head: [['Fecha Efectiva', 'Movimiento (Inicio)', 'Salario', 'Cierre / Baja', 'Observaciones']],
                            body: tableBody,
                            theme: 'grid',
                            headStyles: { 
                                fillColor: colorPrimary, 
                                textColor: [255, 255, 255], 
                                fontSize: 8, 
                                fontStyle: 'bold',
                                halign: 'center'
                            },
                            bodyStyles: { 
                                fontSize: 8, 
                                valign: 'middle',
                                textColor: [50, 50, 50]
                            },
                            columnStyles: {
                                0: { cellWidth: 70, halign: 'center', fontStyle: 'bold' },
                                1: { cellWidth: 140 },
                                2: { cellWidth: 60, halign: 'right', fontStyle: 'bold' },
                                3: { cellWidth: 80, halign: 'center' },
                                4: { cellWidth: 'auto' }
                            },
                            didParseCell: function(data) {
                                if (data.section === 'body') {
                                    if (data.column.index === 4 && data.cell.raw !== 'Trámite Regular') {
                                        data.cell.styles.textColor = colorRed;
                                        data.cell.styles.fontStyle = 'bold';
                                        data.cell.styles.fillColor = [254, 242, 242]; // red-50
                                    }
                                }
                            },
                            margin: { left: 40, right: 40 }
                        });

                        yPos = doc.lastAutoTable.finalY + 25;
                    });
                    
                    // --- SECCIÓN DE CRUCE SISEC ---
                    if (cruceData && cruceData.patronesComparados.length > 0) {
                        doc.addPage();
                        yPos = 40;
                        doc.setFontSize(16);
                        doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                        doc.setFont("helvetica", "bold");
                        doc.text("4. AUDITORÍA CRUZADA: SINDO VS SISEC", 40, yPos);
                        
                        yPos += 10;
                        doc.setDrawColor(colorGold[0], colorGold[1], colorGold[2]);
                        doc.setLineWidth(2);
                        doc.line(40, yPos, 570, yPos);
                        yPos += 25;

                        cruceData.patronesComparados.forEach((comp, idx) => {
                             if (yPos > 650) { doc.addPage(); yPos = 40; }

                             doc.setFontSize(11);
                             doc.setFont("helvetica", "bold");
                             doc.setTextColor(colorPrimary[0], colorPrimary[1], colorPrimary[2]);
                             doc.text(`${idx + 1}. ${comp.nombre}`, 40, yPos);
                             yPos += 12;
                             
                             doc.setFontSize(9);
                             doc.setFont("helvetica", "normal");
                             doc.setTextColor(100, 100, 100);
                             doc.text(`Reg. Patronal: ${comp.registro} | Estatus Cruce: ${comp.status}`, 40, yPos);
                             yPos += 10;

                             const cruceBody = comp.movimientosCruzados.map(mov => {
                                 const sisecText = mov.sisec ? `${mov.sisec.tipoOriginal}\n${mov.sisec.fecha}\n$${mov.sisec.salario}` : 'No reportado';
                                 const sindoText = mov.sindo ? `${mov.sindo.tipoOriginal}\n${mov.sindo.fecha}\n$${mov.sindo.salario}` : 'No reportado';
                                 let statusText = mov.status;
                                 if(statusText === 'MATCH') statusText = 'Coincide OK';
                                 if(statusText === 'MISMATCH_SALARIO') statusText = 'Dif. Salarial';
                                 if(statusText === 'ONLY_SISEC') statusText = 'Falta en SINDO';
                                 if(statusText === 'ONLY_SINDO') statusText = 'Falta en SISEC';

                                 return [ mov.tipoClasif, sisecText, sindoText, statusText ];
                             });

                             doc.autoTable({
                                startY: yPos,
                                head: [['Clasificación', 'Reporte SISEC', 'Historial SINDO', 'Estatus']],
                                body: cruceBody,
                                theme: 'grid',
                                headStyles: { fillColor: colorGold, textColor: colorPrimary, fontSize: 8, fontStyle: 'bold', halign: 'center' },
                                bodyStyles: { fontSize: 8, valign: 'middle' },
                                columnStyles: {
                                    0: { cellWidth: 70, halign: 'center' },
                                    1: { cellWidth: 150 },
                                    2: { cellWidth: 150 },
                                    3: { cellWidth: 'auto', halign: 'center', fontStyle: 'bold' }
                                },
                                didParseCell: function(data) {
                                    if (data.section === 'body' && data.column.index === 3) {
                                        if (data.cell.raw !== 'Coincide OK') {
                                            data.cell.styles.textColor = colorRed;
                                        } else {
                                            data.cell.styles.textColor = [5, 150, 105]; // emerald
                                        }
                                    }
                                },
                                margin: { left: 40, right: 40 }
                            });
                            yPos = doc.lastAutoTable.finalY + 25;
                        });
                    }

                    // --- PIE DE PÁGINA (PAGINACIÓN) ---
                    const pageCount = doc.internal.getNumberOfPages();
                    doc.setFontSize(8);
                    doc.setTextColor(150, 150, 150);
                    for (let i = 1; i <= pageCount; i++) {
                        doc.setPage(i);
                        doc.text(`Página ${i} de ${pageCount} - Dictamen Generado por Portal RGC`, 40, 770);
                    }

                    doc.save(`Dictamen_RGC_${parsedData.personal?.nss || 'Auditoria'}.pdf`);
                } catch (error) {
                    console.error("Error al generar PDF: ", error);

        const parseSISEC = (text) => {
            const data = { personal: {}, employers: [], totalSemanas: 0 };
            const nssMatch = text.match(/NSS:\s*([\d\s\-]+)/i);
            const curpMatch = text.match(/CURP:\s*([A-Z0-9]+)/i);
            if(nssMatch) data.personal.nss = nssMatch[1].trim();
            if(curpMatch) data.personal.curp = curpMatch[1].trim();

            const semanasMatch = text.match(/Total\s+de\s+semanas\s+cotizadas[^\d]*(\d+)/i) || text.match(/semanas\s+cotizadas[:\s]*(\d+)/i);
            if(semanasMatch) data.totalSemanas = parseInt(semanasMatch[1], 10);

            const blocks = text.split(/Nombre\s+del\s+patrón/i).slice(1);
            const allSisecMovs = [];
            
            blocks.forEach(block => {
                const regMatch = block.match(/Registro\s+Patronal\s*([A-Z0-9]+)/i);
                if(!regMatch) return;
                const regPatronal = regMatch[1].trim().substring(0, 10);
                const nameSection = block.split(/Registro\s+Patronal/i)[0];
                const name = nameSection.replace(/\\n/g, ' ').trim() || 'DESCONOCIDO';

                const movRegex = /(BAJA|REINGRESO|MODIFICACION\s*DE\s*SALARIO|ALTA)\s*([\d]{2}\/[\d]{2}\/[\d]{4})\s*\$\s*([\d.]+)/gi;
                let m;
                while ((m = movRegex.exec(block)) !== null) {
                    allSisecMovs.push({
                        registro: regPatronal,
                        nombre: name,
                        tipo: m[1].replace(/\s+/g, ' ').trim().toUpperCase(),
                        fecha: m[2].trim(),
                        salario: m[3].trim()
                    });
                }
            });

            const groupedSisec = {};
            allSisecMovs.forEach(mov => {
                if (!groupedSisec[mov.registro]) {
                    groupedSisec[mov.registro] = { nombre: mov.nombre, registro: mov.registro, movimientos: [] };
                }
                groupedSisec[mov.registro].movimientos.push(mov);
            });

            Object.keys(groupedSisec).forEach(reg => {
                const group = groupedSisec[reg];
                const movsAsc = group.movimientos.sort((a,b) => parseDateStr(a.fecha) - parseDateStr(b.fecha));
                
                let periods = [];
                let curPer = [];
                
                movsAsc.forEach(m => {
                    if (curPer.length > 0 && curPer[curPer.length - 1].tipo === 'BAJA') {
                        periods.push(curPer);
                        curPer = [];
                    }
                    curPer.push(m);
                });
                if (curPer.length > 0) periods.push(curPer);

                periods.forEach((pMovs, index) => {
                    pMovs.sort((a,b) => parseDateStr(b.fecha) - parseDateStr(a.fecha)); 
                    data.employers.push({ 
                        registro: reg, 
                        nombre: group.nombre, 
                        movimientos: pMovs,
                        periodIndex: index + 1,
                        totalPeriods: periods.length
                    });
                });
            });

            return data;
        };

        const processData = () => {
            if (!rawData.trim() && !rawSisec.trim()) return;

            let finalSindoData = null;
            let finalSisecData = null;
            
            if(rawSisec.trim()) finalSisecData = parseSISEC(rawSisec);

            if(rawData.trim()) {
            const sections = rawData.split(/--------------------------------------------------------------------------------/);
            const employers = {};
            const personal = {};
            const historyFlat = [];

            sections.forEach(section => {
                if (section.includes('REGISTRO PATRONAL') || section.includes('REG. PATRONAL')) {
                const regMatch = section.match(/REG(?:ISTRO)?\.?\s*PATRONAL\s+([A-Z0-9-]{10,15})/i);
                const nameMatch = section.match(/NOMBRE\n(.+)/);
                const tMovMatch = section.match(/TIPO DE MOVIMIENTO\s+(\d)/);
                const fMovMatch = section.match(/FECHA DE MOVIMIENTO\s+(\d{2}\/\d{2}\/\d{4})/);
                const bajaCausaMatch = section.match(/CAUSA DE BAJA\s+(.*?)(?:\s+S\.S\.F\.|$)/);

                if (regMatch) {
                    const rawReg = regMatch[1].trim();
                    const cleanRegKey = rawReg.replace(/[^A-Z0-9]/g, '').substring(0, 10);
                    
                    let isBaja = false, bajaDate = null, bajaReason = null;
                    if (tMovMatch && tMovMatch[1] === '2') {
                    isBaja = true;
                    if (fMovMatch) bajaDate = parseDateStr(fMovMatch[1]);
                    bajaReason = bajaCausaMatch ? bajaCausaMatch[1].trim() : "BAJA (SIN ESPECIFICAR)";
                    }

                    employers[cleanRegKey] = { 
                        registroDisplay: rawReg, 
                        nombre: nameMatch ? nameMatch[1].trim() : 'Patrón Desconocido', 
                        isBaja, 
                        bajaDate, 
                        bajaReason,
                        isInternalAdjustment: isInternalAdjustment(cleanRegKey)
                    };
                }
                }
            });

            sections.forEach(section => {
                if (!personal.nss) {
                const nssMatch = section.match(/NUM\. SEG\. SOCIAL\s+([\d\s\-]+)/i) || section.match(/NUMERO DE SEG\.SOC\.? :?\s+([\d\s\-]+)/i) || section.match(/NUM[\.\s]+DE[\.\s]+SEG[\.\s]+SOC[\.\s]+([\d\s\-]+?)REGISTRO/i);
                const curpMatch = section.match(/CURP\.\/RFC\.\s+([A-Z0-9]+)/i) || section.match(/C\.U\.R\.P\s+:\s+([A-Z0-9]+)/i) || section.match(/CURP\s+([A-Z0-9]{18})/i);
                const nameMatch = section.match(/NOMBRE DEL ASEGURADO\s+(.+)/i) || section.match(/N O M B R E\s+:\s+(.+)/i);
                
                if (nssMatch) personal.nss = nssMatch[1].trim();
                if (curpMatch) personal.curp = curpMatch[1].trim();
                if (nameMatch) personal.nombre = nameMatch[1].trim();
                }

                if (section.includes('SB03M') && section.includes('---------INICIO----------')) {
                const lines = section.split('\n');
                lines.forEach(line => {
                    const rowMatch = line.match(/^(\d{2})\s+([A-Z0-9]{10,12})\s+([\d/]{10})\s+(\d)\s+(\d)\s+([\d/]{10})\s+([\d.]+)\s+([FMV])\s+(\d)\s+(SI|NO)\s+(SI|NO)\s+(\d)\s+(\d)\s+([\d/]{10})?/);
                    if (rowMatch) {
                    historyFlat.push({
                        delegacion: rowMatch[1], regPat: rowMatch[2], fRecep: rowMatch[3], origenIni: rowMatch[4], tipoIni: rowMatch[5], fMov: rowMatch[6], salario: rowMatch[7], origenFin: rowMatch[12], tipoFin: rowMatch[13], fBaja: rowMatch[14]
                    });
                    }
                });
                }
            });

            const groupedMap = {};
            
            historyFlat.forEach(mov => {
                const key = mov.regPat.substring(0, 10);
                if (!groupedMap[key]) {
                groupedMap[key] = { info: employers[key] || { nombre: 'Patrón sin datos SP01M', registroDisplay: mov.regPat, isBaja: false, isInternalAdjustment: isInternalAdjustment(key) }, movements: [] };
                }
                groupedMap[key].movements.push(mov);
            });

            const finalGroupedArray = [];
            
            Object.keys(groupedMap).forEach(key => {
                const group = groupedMap[key];
                const movsAsc = group.movements.sort((a,b) => parseDateStr(a.fMov) - parseDateStr(b.fMov));
                
                let periods = [];
                let curPer = [];
                
                movsAsc.forEach(m => {
                    if (curPer.length > 0 && curPer[curPer.length - 1].tipoFin === '2') {
                        periods.push(curPer);
                        curPer = [];
                    }
                    curPer.push(m);
                });
                if (curPer.length > 0) periods.push(curPer);

                periods.forEach((pMovs, index) => {
                    pMovs.sort((a,b) => parseDateStr(b.fMov) - parseDateStr(a.fMov)); 
                    
                    const pInfo = { ...group.info };
                    pInfo.periodIndex = index + 1;
                    pInfo.totalPeriods = periods.length;
                    pInfo.previousPeriodsCount = index;
                    
                    const lastMov = pMovs[0];
                    pInfo.isPeriodClosed = lastMov && lastMov.tipoFin === '2';
                    
                    finalGroupedArray.push({
                        info: pInfo,
                        movements: pMovs,
                        regPatKey: key
                    });
                });
            });

            finalGroupedArray.sort((a, b) => {
                const dA = a.movements[0] ? parseDateStr(a.movements[0].fMov) : new Date(0);
                const dB = b.movements[0] ? parseDateStr(b.movements[0].fMov) : new Date(0);
                return dB - dA;
            });

            const stats = { counts: { '5': 0, '6': 0, '7': 0, '8': 0, '9': 0 }, riskEvents: [], lateEvents: [], bajaCompanies: [], suspiciousDates: [], totalRisks: 0, bajaConflicts: 0 };

            finalGroupedArray.forEach(group => {
                const isMod40 = group.info.nombre.toUpperCase().includes('CONTINUACION VOLUNTARIA');
                const empNameWithPeriod = group.info.totalPeriods > 1 ? `${group.info.nombre} (Periodo ${group.info.periodIndex})` : group.info.nombre;

                group.movements.forEach(mov => {
                const lateInfo = getLateSubmissionInfo(mov.fRecep, mov.fMov);
                mov.lateInfo = lateInfo;

                if (isMod40 && lateInfo.isLate && lateInfo.diffDays > 45) {
                    mov.isMod40Retro = true;
                    lateInfo.isMod40Retro = true;
                    lateInfo.label = 'M40 RETROACTIVA';
                    lateInfo.badgeClass = 'bg-[#D4AF37] border-[#B8962E] text-[#003366] font-black shadow-md print:bg-white print:border-[#003366] print:text-[#003366]';
                }

                if (lateInfo.isLate) {
                    stats.lateEvents.push({ 
                        empresa: empNameWithPeriod, 
                        fechaMov: mov.fMov, 
                        fechaRecep: mov.fRecep, 
                        diffDays: lateInfo.diffDays, 
                        level: lateInfo.level, 
                        label: lateInfo.label, 
                        badgeClass: lateInfo.badgeClass, 
                        colorClass: lateInfo.colorClass, 
                        tipo: TIPO_MAP[mov.tipoIni] || 'Movimiento', 
                        isMod40Retro: lateInfo.isMod40Retro,
                        obs: lateInfo.obs,
                        isJustified: lateInfo.isJustified
                    });
                }

                if (mov.fRecep === '00/00/0000') {
                    stats.totalRisks++;
                    stats.suspiciousDates.push({ 
                        empresa: empNameWithPeriod, 
                        fecha: mov.fMov, 
                        origen: mov.origenIni || '0', 
                        tipo: mov.tipoIni, 
                        desc: 'Fecha 00/00/0000 (Registro Sospechoso)' 
                    });
                }

                if (isRiskOrigin(mov.origenIni)) {
                    stats.counts[mov.origenIni] = (stats.counts[mov.origenIni] || 0) + 1;
                    stats.totalRisks++;
                    stats.riskEvents.push({ empresa: empNameWithPeriod, fecha: mov.fMov, origen: mov.origenIni, tipo: mov.tipoIni, etapa: 'INICIO', desc: TIPO_MAP[mov.tipoIni] || 'Desconocido' });
                }
                if (isRiskOrigin(mov.origenFin)) {
                    stats.counts[mov.origenFin] = (stats.counts[mov.origenFin] || 0) + 1;
                    stats.totalRisks++;
                    stats.riskEvents.push({ empresa: empNameWithPeriod, fecha: mov.fBaja || mov.fMov, origen: mov.origenFin, tipo: mov.tipoFin, etapa: 'CIERRE', desc: TIPO_MAP[mov.tipoFin] || 'Desconocido' });
                }
                });
            });

            Object.keys(employers).forEach(key => {
                const emp = employers[key];
                if (emp.isBaja) {
                    const movs = historyFlat.filter(m => m.regPat.substring(0,10) === key);
                    let hasPostBajaMovements = false;
                    let workerBajaDateStr = 'Sin registro explícito';
                    let maxBaja = null;
                    
                    movs.forEach(mov => {
                        if (emp.bajaDate && parseDateStr(mov.fMov) > emp.bajaDate) hasPostBajaMovements = true;
                        if (mov.fBaja && emp.bajaDate && parseDateStr(mov.fBaja) > emp.bajaDate) hasPostBajaMovements = true;
                        if (mov.tipoFin === '2' || mov.tipoIni === '2') {
                            const d = parseDateStr(mov.fBaja || mov.fMov);
                            if (!maxBaja || d > maxBaja) {
                                maxBaja = d;
                                workerBajaDateStr = mov.fBaja || mov.fMov;
                            }
                        }
                    });
                    
                    stats.bajaCompanies.push({
                        nombre: emp.nombre,
                        razon: emp.bajaReason || 'BAJA SIN ESPECIFICAR',
                        fecha: emp.bajaDate,
                        workerBajaDateStr,
                        hasPostBajaMovements
                    });
                }
            });

            stats.riskEvents.sort((a, b) => parseDateStr(b.fecha) - parseDateStr(a.fecha));
            stats.lateEvents.sort((a, b) => b.diffDays - a.diffDays);
            finalSindoData = { personal, grouped: finalGroupedArray, stats };
            }

            let finalCruce = null;
            if(finalSindoData && finalSisecData) {
            finalCruce = { alertas: [], patronesComparados: [] };
            
            if (finalSindoData.personal.nss && finalSisecData.personal.nss) {
                const cleanSindoNSS = finalSindoData.personal.nss.replace(/[^0-9]/g, '').substring(0, 11);
                const cleanSisecNSS = finalSisecData.personal.nss.replace(/[^0-9]/g, '').substring(0, 11);
                if (cleanSindoNSS && cleanSisecNSS && cleanSindoNSS !== cleanSisecNSS) {
                    finalCruce.alertas.push({ tipo: 'CRITICO', msj: `¡DISCREPANCIA DE IDENTIDAD! El NSS en SINDO (${cleanSindoNSS}) no coincide con el NSS en SISEC (${cleanSisecNSS}).` });
                }
            }

            const sindoRegs = finalSindoData.grouped.map(g => g.regPatKey);
            const sisecRegs = finalSisecData.employers.map(e => e.registro);
            const allRegs = new Set([...sindoRegs, ...sisecRegs]);
            
            allRegs.forEach(reg => {
                const sGroups = finalSindoData.grouped.filter(g => g.regPatKey === reg);
                const sEmps = finalSisecData.employers.filter(e => e.registro === reg);
                
                const baseNombre = sGroups[0]?.info.nombre || sEmps[0]?.nombre || 'DESCONOCIDO';
                const hasMultiplePeriods = sGroups.length > 1 || sEmps.length > 1;
                const maxPeriodsCount = Math.max(sGroups.length, sEmps.length);
                
                const comp = { 
                    registro: reg, 
                    nombre: baseNombre,
                    hasMultiplePeriods,
                    maxPeriodsCount,
                    isInternalAdjustment: isInternalAdjustment(reg),
                    status: 'OK', 
                    detalles: [], 
                    movimientosCruzados: [] 
                };
                
                let sisecMovsStd = [];
                sEmps.forEach(sEmp => {
                    sEmp.movimientos.forEach(m => {
                        const bucket = m.tipo === 'BAJA' ? 'BAJA' : 'INICIO_MODIF';
                        sisecMovsStd.push({ bucket, tipoOriginal: m.tipo, fecha: m.fecha, salario: parseFloat(m.salario.replace(/[^0-9.]/g, '')) });
                    });
                });
                
                let sindoMovsStd = [];
                sGroups.forEach(sGroup => {
                    sGroup.movements.forEach(m => {
                        const sal = parseFloat(m.salario);
                        const tipoOrig = m.tipoIni === '8' ? 'REINGRESO' : (m.tipoIni === '1' ? 'ALTA' : 'MODIFICACIÓN');
                        const riskIni = isRiskOrigin(m.origenIni);
                        
                        sindoMovsStd.push({ 
                            bucket: 'INICIO_MODIF', 
                            tipoOriginal: tipoOrig, 
                            fecha: m.fMov, 
                            salario: sal,
                            origen: m.origenIni,
                            tipoCod: m.tipoIni,
                            isRisk: riskIni
                        });
                        
                        if (m.tipoFin === '2') {
                            const riskFin = isRiskOrigin(m.origenFin);
                            sindoMovsStd.push({ 
                                bucket: 'BAJA', 
                                tipoOriginal: 'BAJA', 
                                fecha: m.fBaja || m.fMov, 
                                salario: sal,
                                origen: m.origenFin,
                                tipoCod: m.tipoFin,
                                isRisk: riskFin
                            });
                        }
                    });
                });

                const cruceMovs = [];
                ['INICIO_MODIF', 'BAJA'].forEach(bucket => {
                    let sList = sisecMovsStd.filter(m => m.bucket === bucket);
                    let dList = sindoMovsStd.filter(m => m.bucket === bucket);

                    sList.forEach(sm => {
                        let dIndex = dList.findIndex(dm => dm.fecha === sm.fecha);
                        if (dIndex >= 0) {
                            let dm = dList[dIndex];
                            let matchSalario = Math.abs(sm.salario - dm.salario) < 0.05;
                            cruceMovs.push({ tipoClasif: bucket === 'BAJA' ? 'BAJA' : 'ALTA/MODIF', sisec: sm, sindo: dm, status: matchSalario ? 'MATCH' : 'MISMATCH_SALARIO' });
                            dList.splice(dIndex, 1);
                        } else cruceMovs.push({ tipoClasif: bucket === 'BAJA' ? 'BAJA' : 'ALTA/MODIF', sisec: sm, sindo: null, status: 'ONLY_SISEC' });
                    });
                    dList.forEach(dm => cruceMovs.push({ tipoClasif: bucket === 'BAJA' ? 'BAJA' : 'ALTA/MODIF', sisec: null, sindo: dm, status: 'ONLY_SINDO' }));
                });

                cruceMovs.sort((a,b) => (parseDateStr(b.sisec ? b.sisec.fecha : b.sindo.fecha)?.getTime() || 0) - (parseDateStr(a.sisec ? a.sisec.fecha : a.sindo.fecha)?.getTime() || 0));
                comp.movimientosCruzados = cruceMovs;

                if (sGroups.length > 0 && sEmps.length === 0) {
                    comp.status = 'ALERTA'; comp.detalles.push({ tipo: 'FALTANTE', desc: 'Esta empresa aparece en el historial SINDO pero NO en el SISEC.' });
                } else if (sGroups.length === 0 && sEmps.length > 0) {
                    comp.status = 'ALERTA'; comp.detalles.push({ tipo: 'FALTANTE', desc: 'Esta empresa aparece en SISEC pero NO en el historial del SINDO.' });
                } else {
                    if (cruceMovs.some(m => m.status !== 'MATCH') && comp.status === 'OK') comp.status = 'ALERTA';
                    
                    if (sindoMovsStd.length !== sisecMovsStd.length) {
                        comp.detalles.push({ tipo: 'INFO', desc: `Discrepancia de volumen: SINDO reporta ${sindoMovsStd.length} movimiento(s) lógico(s) y SISEC registra ${sisecMovsStd.length} fila(s).` });
                    }
                }
                finalCruce.patronesComparados.push(comp);
            });
            
            finalCruce.patronesComparados.sort((a,b) => {
                const dateA = a.movimientosCruzados[0] ? parseDateStr(a.movimientosCruzados[0].sisec?.fecha || a.movimientosCruzados[0].sindo?.fecha) : new Date(0);
                const dateB = b.movimientosCruzados[0] ? parseDateStr(b.movimientosCruzados[0].sisec?.fecha || b.movimientosCruzados[0].sindo?.fecha) : new Date(0);
                return dateB - dateA;
            });
            }

                                                        {baja.razon}
                                                    </span>
                                                    <div className="flex flex-col gap-0.5 mt-1 sm:mt-0">
                                                        <span className="text-xs text-slate-400 font-mono font-bold print:text-slate-600">
                                                            Cierre Empresa: {formatDate(baja.fecha)}
                                                        </span>
                                                        <span className="text-[11px] text-[#D4AF37] font-mono font-bold print:text-orange-700">
                                                            Baja Trabajador: {baja.workerBajaDateStr}
                                                        </span>
                                                    </div>
                                                    </div>
                                                </div>
                                                </div>

                                                <div className="shrink-0 w-full md:w-auto">
                                                {baja.hasPostBajaMovements ? (
                                                    <div className="flex items-center gap-3 bg-rose-600/10 border border-rose-600 text-rose-400 px-4 py-2.5 rounded-xl shadow-sm print:bg-white print:text-rose-600">
                                                    <Siren className="w-5 h-5 animate-pulse" />
                                                    <div className="flex flex-col">
                                                        <span className="text-xs font-black uppercase tracking-widest">Alerta de Fraude</span>
                                                        <span className="text-[10px] font-semibold">Cotizaciones post-clausura detectadas.</span>
                                                    </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center gap-3 text-emerald-400 px-4 py-2.5 bg-emerald-900/20 border border-emerald-500/30 rounded-xl print:bg-white print:text-emerald-600 print:border-emerald-600">
                                                    <CheckCircle2 className="w-5 h-5" />
                                                    <div className="flex flex-col">
                                                        <span className="text-xs font-black uppercase tracking-widest">Estatus Lógico</span>
                                                        <span className="text-[10px] font-semibold">Sin reportes posteriores a la baja.</span>
                                                    </div>
                                                    </div>
                                                )}
                                                </div>

                                            </div>
                                            ))}
                                        </div>
                                    </div>
                                    )}
                                </div>
                            </div>

                        </div>
                    )}

                    {cruceData && (
                        <div className={`tab-content ${activeTab === 'cruce' ? 'block' : 'hidden'} page-break pt-4`}>
                            
                            <div className="flex items-center gap-3 mb-8 print:mt-4">
                                <div className="bg-[#D4AF37] p-2 rounded-lg print:hidden"><GitMerge className="w-6 h-6 text-[#003366]" /></div>
                                <h3 className="text-2xl font-black text-[#003366] uppercase tracking-widest border-b-4 border-[#D4AF37] pb-2 w-full print-text-blue">3. Auditoría Cruzada: SINDO vs SISEC</h3>
                            </div>

                            {cruceData.alertas.length > 0 && (
                                <div className="bg-rose-50 border-l-[8px] border-rose-600 p-6 rounded-r-2xl mb-8 shadow-sm print:border-rose-600">
                                    <h4 className="text-sm font-black text-rose-800 uppercase tracking-widest mb-4">Alertas Críticas de Identidad</h4>
                                    {cruceData.alertas.map((al, i) => (
                                        <div key={i} className="flex items-center gap-3 text-rose-700 font-bold bg-white p-4 rounded-xl border border-rose-200 shadow-sm">
                                            <AlertTriangle className="w-6 h-6 shrink-0" />
                                            <span>{al.msj}</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="grid gap-8 avoid-break">
                                {cruceData.patronesComparados.map((comp, i) => (
                                    <div key={i} className={`p-6 rounded-3xl border-[2px] transition-shadow shadow-sm avoid-break print:shadow-none print-border ${
                                        comp.status === 'CRITICO' ? 'bg-rose-50/50 border-rose-300' : 
                                        comp.status === 'ALERTA' ? 'bg-orange-50/50 border-orange-200' : 
                                        'bg-white border-slate-200'
                                    }`}>
                                        <div className="flex justify-between items-start mb-6 border-b border-slate-200/60 pb-4">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                                    <Briefcase className="w-4 h-4 text-slate-400" />
                                                    <span className="text-xs font-black font-mono text-slate-500 uppercase tracking-widest bg-slate-100 px-2 py-0.5 rounded-md border border-slate-200">REG: {comp.registro}</span>
                                                    {comp.isInternalAdjustment && (
                                                        <span className="text-[10px] bg-indigo-100 text-indigo-800 border border-indigo-200 px-2 py-0.5 rounded-md font-bold uppercase tracking-widest flex items-center gap-1 print:bg-white print:border-indigo-400">
                                                            <ShieldCheck className="w-3 h-3" />
                                                            Ajuste Interno
                                                        </span>
                                                    )}
                                                </div>
                                                <h4 className="text-xl font-black text-[#003366]">{comp.nombre}</h4>
                                                {comp.hasMultiplePeriods && (
                                                    <div className="mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-blue-50 text-blue-700 border border-blue-200 text-xs font-black tracking-widest uppercase">
                                                        <History className="w-4 h-4" /> Historial unificado ({comp.maxPeriodsCount} periodos laborales detectados)
                                                    </div>
                                                )}
                                            </div>
                                            <StatusBadgeCruce status={comp.status} />
                                        </div>
                                        
                                        {comp.detalles.length > 0 && (
                                            <ul className="space-y-3 mb-6">
                                                {comp.detalles.map((det, j) => {
                                                    let icon = <ArrowRight className="w-5 h-5 mt-0.5 shrink-0 text-slate-400" />;
                                                    let textColor = "text-slate-800";
                                                    if (det.tipo === 'CRITICO') { icon = <Siren className="w-5 h-5 mt-0.5 shrink-0 text-rose-600 animate-pulse print-text-rose-600" />; textColor = "text-rose-700 font-bold"; }
                                                    if (det.tipo === 'ALERTA') { icon = <AlertTriangle className="w-5 h-5 mt-0.5 shrink-0 text-orange-500" />; textColor = "text-orange-700 font-semibold"; }
                                                    if (det.tipo === 'INFO') { icon = <FileWarning className="w-5 h-5 mt-0.5 shrink-0 text-[#003366]" />; textColor = "text-[#003366]"; }
                                                    if (det.tipo === 'OK') { icon = <CheckCircle2 className="w-5 h-5 mt-0.5 shrink-0 text-emerald-600" />; textColor = "text-emerald-700 font-bold"; }
                                                    
                                                    return (
                                                        <li key={j} className="text-sm flex items-start gap-3 bg-white/60 p-4 rounded-xl border border-slate-200 print-bg-white print-border shadow-sm">
                                                            {icon}
                                                            <span className={textColor}>{det.desc}</span>
                                                        </li>
                                                    );
                                                })}
                                            </ul>
                                        )}

                                        <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm print-border">
                                            <table className="w-full text-left text-sm print:min-w-full">
                                                <thead className="bg-slate-100 text-slate-500 uppercase tracking-widest text-[10px] print-bg-slate-50">
                                                    <tr>
                                                        <th className="px-5 py-3 font-black border-b border-slate-200 w-[15%]">Clasificación</th>
                                                        <th className="px-5 py-3 font-black border-b border-slate-200 w-[30%] bg-blue-50/50 print-bg-slate-100 text-[#003366]">Reporte SISEC</th>
                                                        <th className="px-5 py-3 font-black border-b border-slate-200 w-[30%] bg-slate-50 print-bg-slate-100">Historial SINDO</th>
                                                        <th className="px-5 py-3 font-black border-b border-slate-200 w-[25%] text-center">Estatus</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 bg-white print-divide-slate-200">
                                                    {comp.movimientosCruzados.map((mov, mIdx) => (
                                                        <tr key={mIdx} className="hover:bg-slate-50 transition-colors">
                                                            <td className="px-5 py-3 font-black text-slate-700 text-xs">
                                                                <span className="bg-slate-100 text-slate-500 px-2 py-1 rounded-md text-[9px] uppercase tracking-widest">{mov.tipoClasif}</span>
                                                            </td>
                                                            
                                                            <td className={`px-5 py-3 font-mono text-sm ${mov.sisec ? 'text-slate-800 font-semibold' : 'text-slate-300 italic print-text-slate-400'}`}>
                                                                {mov.sisec ? (
                                                                    <div className="flex flex-col gap-0.5">
                                                                        <span className="text-[10px] text-[#003366] font-black uppercase tracking-widest">{mov.sisec.tipoOriginal}</span>
                                                                        <span>{mov.sisec.fecha} - ${mov.sisec.salario}</span>
                                                                    </div>
                                                                ) : 'No reportado'}
                                                            </td>
                                                            
                                                            <td className={`px-5 py-3 font-mono text-sm ${mov.sindo ? 'text-slate-800 font-semibold' : 'text-slate-300 italic print-text-slate-400'}`}>
                                                                {mov.sindo ? (
                                                                    <div className="flex flex-col gap-2">
                                                                        <div className="flex flex-col gap-0.5">
                                                                            <span className="text-[10px] text-[#003366] font-black uppercase tracking-widest">{mov.sindo.tipoOriginal}</span>
                                                                            <span>{mov.sindo.fecha} - ${mov.sindo.salario}</span>
                                                                        </div>
                                                                        <div className="flex flex-wrap gap-1.5 items-center">
                                                                            <StatusBadge code={mov.sindo.tipoCod} map={TIPO_MAP} type="T" colorOverride="bg-slate-50 text-slate-500 border-slate-200 print-border" />
                                                                            <span className="text-[9px] text-slate-300 print:hidden">+</span>
                                                                            <StatusBadge code={mov.sindo.origen} map={ORIGEN_MAP} type="O" isRisk={mov.sindo.isRisk} />
                                                                        </div>
                                                                    </div>
                                                                ) : 'No reportado'}
                                                            </td>
                                                            
                                                            <td className="px-5 py-3 text-center">
                                                                {mov.status === 'MATCH' && <span className="inline-flex items-center gap-1.5 bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest uppercase print-border"><CheckCircle2 className="w-3 h-3" /> OK</span>}
                                                                {mov.status === 'MISMATCH_SALARIO' && <span className="inline-flex items-center gap-1.5 bg-orange-100 text-orange-800 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest uppercase print-border"><AlertTriangle className="w-3 h-3" /> Dif. Salario</span>}
                                                                {mov.status === 'ONLY_SISEC' && <span className="inline-flex items-center gap-1.5 bg-rose-100 text-rose-800 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest uppercase print-border"><XCircle className="w-3 h-3" /> Falta SINDO</span>}
                                                                {mov.status === 'ONLY_SINDO' && <span className="inline-flex items-center gap-1.5 bg-rose-100 text-rose-800 px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest uppercase print-border"><XCircle className="w-3 h-3" /> Falta SISEC</span>}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {comp.movimientosCruzados.length === 0 && (
                                                        <tr>
                                                            <td colSpan="4" className="px-5 py-8 text-center text-slate-400 italic font-medium">No se encontraron movimientos comparables para este registro.</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    )}

                </div>
                )}
            </div>
            </div>
        );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
